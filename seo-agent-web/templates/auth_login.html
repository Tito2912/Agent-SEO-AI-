<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Connexion — SEO Audit</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <h1>Connexion</h1>
          <p class="muted">Accédez à votre espace.</p>
        </div>

        {% if err %}
          <div class="alert error">
            <span class="badge error">erreur</span>
            <p class="muted small">{{ err }}</p>
          </div>
        {% endif %}

        <form method="post" action="/auth/login">
          <input type="hidden" name="next" value="{{ next }}" />

          <label>
            Email
            <input name="email" type="email" autocomplete="email" required value="{{ email }}" />
          </label>

          <div class="row"></div>

          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="current-password" required />
          </label>

          <div class="row-actions">
            <button class="btn primary" type="submit">Se connecter</button>
            <a class="btn" href="/auth/signup?next={{ next_q }}">Créer un compte</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
