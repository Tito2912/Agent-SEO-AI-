<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Connexion - SEO Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card auth-card">

        <!-- Brand header -->
        <div style="text-align:center; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border);">
          <a href="/" style="font-size:20px; font-weight:900; color:var(--text); letter-spacing:.01em; text-decoration:none;">SEO Agent</a>
          <p style="margin:5px 0 0; font-size:12px; color:var(--muted);">Audit SEO Intelligent</p>
        </div>

        <div class="page-header">
          <h1>Connexion</h1>
          <p class="muted">Accédez à votre espace.</p>
        </div>

        {% if msg %}
          <div class="alert ok">
            <span class="badge ok">ok</span>
            <p class="muted small">{{ msg }}</p>
          </div>
        {% endif %}

        {% if err %}
          <div class="alert error">
            <span class="badge error">erreur</span>
            <p class="muted small">{{ err }}</p>
          </div>
        {% endif %}

        <form method="post" action="/auth/login">
          <input type="hidden" name="_csrf" value="{{ request.state.csrf_token or '' }}" />
          <input type="hidden" name="next" value="{{ next }}" />

          <button
            class="btn block"
            type="submit"
            formaction="/auth/google/start"
            name="mode"
            value="login"
            formnovalidate
          >
            <img class="oauth-logo" src="/static/google.svg" alt="" aria-hidden="true" />
            Continuer avec Google
          </button>

          <div class="auth-divider"><span>ou</span></div>

          <label>
            Email
            <input name="email" type="email" autocomplete="email" required value="{{ email }}" />
          </label>

          <div class="row"></div>

          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="current-password" required />
          </label>

          <p class="muted small" style="margin: 10px 0 0; display:flex; gap:10px; flex-wrap:wrap;">
            <a href="/auth/forgot?next={{ next_q }}">Mot de passe oublié ?</a>
            <span class="muted">·</span>
            <a href="/auth/verify/resend?next={{ next_q }}&email={{ email_q }}">Renvoyer la vérification</a>
          </p>

          <div class="row-actions">
            <button class="btn primary" type="submit">Se connecter</button>
            <a class="btn" href="/auth/signup?next={{ next_q }}">Créer un compte</a>
          </div>
        </form>

      </section>
    </main>
  </body>
</html>
