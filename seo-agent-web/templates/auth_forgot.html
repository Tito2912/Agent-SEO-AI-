<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mot de passe oublié — SEO Audit</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card auth-card">
        <div style="text-align:center; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border);">
          <a href="/" style="font-size:20px; font-weight:900; color:var(--text); text-decoration:none; letter-spacing:-.01em;">SEO Agent</a>
          <p style="margin:5px 0 0; font-size:12px; color:var(--muted);">Audit SEO Intelligent</p>
        </div>
        <div class="page-header">
          <h1>Mot de passe oublié</h1>
          <p class="muted">Recevez un lien de réinitialisation par email.</p>
        </div>

        {% if msg %}
          <div class="alert ok">
            <span class="badge ok">ok</span>
            <p class="muted small">{{ msg }}</p>
          </div>
        {% endif %}

        {% if err %}
          <div class="alert error">
            <span class="badge error">erreur</span>
            <p class="muted small">{{ err }}</p>
          </div>
        {% endif %}

        <form method="post" action="/auth/forgot">
          <input type="hidden" name="_csrf" value="{{ request.state.csrf_token or '' }}" />
          <input type="hidden" name="next" value="{{ next }}" />

          <label>
            Email
            <input name="email" type="email" autocomplete="email" required value="{{ email }}" />
          </label>

          <p class="muted small" style="margin: 8px 0 0;">
            Si un compte existe, un email est envoyé (pensez à vérifier vos spams).
          </p>

          <div class="row-actions" style="margin-top: 14px;">
            <button class="btn primary" type="submit">Envoyer le lien</button>
            <a class="btn" href="/auth/login?next={{ next_q }}">Retour connexion</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
