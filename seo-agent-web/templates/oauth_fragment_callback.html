<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion {{ provider_label }}</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #080808;
        color: #f4efe6;
      }
      .card {
        width: min(520px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #101010;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      .title {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }
      .muted {
        margin: 0;
        color: #bcb4a8;
      }
    </style>
  </head>
  <body>
    <form id="oauth-complete-form" method="post" action="{{ complete_url }}">
      <input type="hidden" name="access_token" id="oauth-access-token" value="" />
      <input type="hidden" name="state" id="oauth-state" value="" />
      <input type="hidden" name="error" id="oauth-error" value="" />
      <input type="hidden" name="error_description" id="oauth-error-description" value="" />
      <div class="card">
        <h1 class="title">Connexion {{ provider_label }}</h1>
        <p class="muted">Traitement en cours…</p>
      </div>
    </form>

    <script>
      (() => {
        const form = document.getElementById("oauth-complete-form");
        if (!form) return;
        const hash = String(window.location.hash || "").replace(/^#/, "");
        const params = new URLSearchParams(hash);
        const query = new URLSearchParams(String(window.location.search || ""));
        if (window.location.hash) {
          const cleanUrl = `${window.location.pathname}${window.location.search || ""}`;
          window.history.replaceState({}, document.title, cleanUrl);
        }
        document.getElementById("oauth-access-token").value = String(params.get("access_token") || "");
        document.getElementById("oauth-state").value = String(params.get("state") || query.get("state") || "");
        document.getElementById("oauth-error").value = String(params.get("error") || "");
        document.getElementById("oauth-error-description").value = String(params.get("error_description") || "");
        form.submit();
      })();
    </script>
  </body>
</html>
