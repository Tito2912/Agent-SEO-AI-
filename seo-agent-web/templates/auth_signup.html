<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Créer un compte — SEO Audit</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <h1>Créer un compte</h1>
          <p class="muted">Votre compte vous permet de gérer vos projets et vos crawls.</p>
        </div>

        {% if err %}
          <div class="alert error">
            <span class="badge error">erreur</span>
            <p class="muted small">{{ err }}</p>
          </div>
        {% endif %}

        <form method="post" action="/auth/signup">
          <input type="hidden" name="_csrf" value="{{ request.state.csrf_token or '' }}" />
          <input type="hidden" name="next" value="{{ next }}" />

          <button
            class="btn block"
            type="submit"
            formaction="/auth/google/start"
            name="mode"
            value="signup"
            formnovalidate
            {% if signup_disabled %}disabled{% endif %}
          >
            <img class="oauth-logo" src="/static/google.svg" alt="" aria-hidden="true" />
            Continuer avec Google
          </button>

          <div class="auth-divider"><span>ou</span></div>

          {% if signup_disabled %}
            <p class="muted small" style="margin: 0 0 10px;">Inscriptions fermées.</p>
          {% endif %}

          <label>
            Email
            <input name="email" type="email" autocomplete="email" required value="{{ email }}" />
          </label>

          <div class="row"></div>

          {% if invite_required %}
            <label>
              Code d’invitation
              <input name="invite_code" type="text" autocomplete="off" value="{{ invite_code }}" />
            </label>
            <div class="row"></div>
          {% endif %}

          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="new-password" required minlength="10" />
          </label>
          <p class="muted small" style="margin: 8px 0 0;">Minimum 10 caractères.</p>

          <div class="row-actions">
            <button class="btn primary" type="submit" {% if signup_disabled %}disabled{% endif %}>Créer le compte</button>
            <a class="btn" href="/auth/login?next={{ next_q }}">J’ai déjà un compte</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
