<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vérification email — SEO Audit</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <h1>Vérification email</h1>
          <p class="muted">Renvoyez l’email de vérification.</p>
        </div>

        {% if msg %}
          <div class="alert ok">
            <span class="badge ok">ok</span>
            <p class="muted small">{{ msg }}</p>
          </div>
        {% endif %}

        {% if err %}
          <div class="alert error">
            <span class="badge error">erreur</span>
            <p class="muted small">{{ err }}</p>
          </div>
        {% endif %}

        <form method="post" action="/auth/verify/resend">
          <input type="hidden" name="_csrf" value="{{ request.state.csrf_token or '' }}" />
          <input type="hidden" name="next" value="{{ next }}" />

          <label>
            Email
            <input name="email" type="email" autocomplete="email" required value="{{ email }}" />
          </label>

          <p class="muted small" style="margin: 8px 0 0;">
            Si un compte existe, un email de vérification est envoyé (pensez à vérifier vos spams).
          </p>

          <div class="row-actions" style="margin-top: 14px;">
            <button class="btn primary" type="submit">Renvoyer l’email</button>
            <a class="btn" href="/auth/login?next={{ next_q }}">Retour connexion</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
