name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPATH: seo-agent-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: seo-agent-web/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r seo-agent-web/requirements-dev.txt

      - name: Compile Python
        run: python -m compileall -q seo-agent-web/backend seo-agent-web/tests skills/public/seo-autopilot/scripts

      - name: Ruff
        run: python -m ruff check --select=F,E9 seo-agent-web/backend seo-agent-web/tests skills/public/seo-autopilot/scripts

      - name: Tests
        run: python -m pytest -q -s seo-agent-web/tests

      - name: Dependency audit
        run: python -m pip_audit --local --progress-spinner off --timeout 10

      - name: Bandit medium/high
        run: python -m bandit -q -ll -r seo-agent-web/backend skills/public/seo-autopilot/scripts
