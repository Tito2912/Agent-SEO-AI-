databases:
  - name: seo-agent-db
    ipAllowList: []

services:
  - type: web
    name: seo-agent-web
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seo-agent-db
          property: connectionString
      - key: SEO_AGENT_DATA_DIR
        value: /var/data/data
      - key: SEO_AGENT_RUNS_DIR
        value: /var/data/seo-runs
      - key: SEO_AGENT_CONFIG_PATH
        value: /app/seo-autopilot.yml
      - key: SEO_AGENT_SECRET_KEY
        generateValue: true
      - key: SEO_AGENT_ENCRYPTION_KEY
        sync: false
      - key: SEO_AGENT_ENCRYPTION_KEYS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_PREFIX
        value: seo-runs
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: SIGNUP_INVITE_CODE
        sync: false
      - key: SIGNUP_ALLOWLIST_EMAILS
        sync: false
      - key: SIGNUP_ALLOWLIST_DOMAINS
        sync: false
      - key: SIGNUP_DISABLED
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_REDIRECT_URI
        sync: false
      - key: NETLIFY_OAUTH_CLIENT_ID
        sync: false
      - key: NETLIFY_OAUTH_REDIRECT_URI
        sync: false
      - key: BING_OAUTH_CLIENT_ID
        sync: false
      - key: BING_OAUTH_CLIENT_SECRET
        sync: false
      - key: BING_OAUTH_REDIRECT_URI
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: APP_NAME
        sync: false
      - key: PAGESPEED_API_KEY
        sync: false
      - key: BING_WEBMASTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: BETA_BASIC_AUTH_USER
        sync: false
      - key: BETA_BASIC_AUTH_PASS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_SOLO
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: STRIPE_PRICE_ID_BUSINESS
        sync: false
      - key: SEO_AGENT_DISABLE_WORKER
        value: "true"
      - key: SEO_AGENT_WORKER_CONCURRENCY
        value: "1"
      - key: SEO_AGENT_CRAWL_JOB_TIMEOUT_SECONDS
        value: "21600"
      - key: SEO_AGENT_AUTOPILOT_JOB_TIMEOUT_SECONDS
        value: "10800"
      - key: SEO_AGENT_JOBS_RETENTION_DAYS
        sync: false
      - key: SEO_AGENT_RUNS_RETENTION_DAYS
        sync: false
      - key: SEO_AGENT_RETENTION_EVERY_SECONDS
        value: "21600"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_STARTTLS
        sync: false
      - key: SMTP_SSL
        sync: false
      - key: SMTP_TIMEOUT_SECONDS
        sync: false
      - key: EMAIL_VERIFICATION_DISABLED
        sync: false
      - key: EMAIL_VERIFY_TTL_SECONDS
        sync: false
      - key: EMAIL_VERIFY_EMAIL_SUBJECT
        sync: false
      - key: PASSWORD_RESET_TTL_SECONDS
        sync: false
      - key: PASSWORD_RESET_EMAIL_SUBJECT
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.05"
      - key: SENTRY_ENVIRONMENT
        value: "prod"

  - type: worker
    name: seo-agent-worker
    runtime: docker
    plan: starter
    disk:
      name: worker-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seo-agent-db
          property: connectionString
      - key: SEO_AGENT_SERVICE_MODE
        value: worker
      - key: SEO_AGENT_DATA_DIR
        value: /var/data/data
      - key: SEO_AGENT_RUNS_DIR
        value: /var/data/seo-runs
      - key: SEO_AGENT_CONFIG_PATH
        value: /app/seo-autopilot.yml
      # Required to decrypt/encrypt secrets stored in DB (must match the web service).
      - key: SEO_AGENT_ENCRYPTION_KEY
        sync: false
      - key: SEO_AGENT_ENCRYPTION_KEYS
        sync: false
      # Runs artefacts storage (recommended when separating web/worker).
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_PREFIX
        value: seo-runs
      # Integrations / AI keys used during jobs
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: PAGESPEED_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: BING_OAUTH_CLIENT_ID
        sync: false
      - key: BING_OAUTH_CLIENT_SECRET
        sync: false
      - key: NETLIFY_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      # Retention
      - key: SEO_AGENT_JOBS_RETENTION_DAYS
        sync: false
      - key: SEO_AGENT_RUNS_RETENTION_DAYS
        sync: false
      - key: SEO_AGENT_RETENTION_EVERY_SECONDS
        value: "21600"
